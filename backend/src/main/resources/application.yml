spring:
  application:
    name: e-bogcha
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:e_bogcha}?currentSchema=${DB_SCHEMA:public}
    username: ${DB_USER:e_bogcha}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: EBogchaHikariPool
      minimum-idle: 1
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${DB_SCHEMA:public}
    schemas: ${DB_SCHEMA:public}
    create-schemas: false
    validate-on-migrate: true
    clean-disabled: true
    baseline-on-migrate: false
    out-of-order: false
  sql:
    init:
      mode: never

server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      show-components: never

auth:
  jwt:
    secret-base64: ${JWT_SECRET_BASE64:}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:900}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:2592000}
    issuer: ${JWT_ISSUER:e-bogcha}
    audience: ${JWT_AUDIENCE:e-bogcha-web}
  lockout:
    max-failed-attempts: ${AUTH_MAX_FAILED_ATTEMPTS:5}
    lock-duration-seconds: ${AUTH_LOCK_DURATION_SECONDS:900}
  cookie:
    secure: ${AUTH_COOKIE_SECURE:false}
  dev-actor:
    header-enabled: ${DEV_ACTOR_HEADER_ENABLED:false}

logging:
  level:
    org.springframework.jdbc.core: INFO
    org.flywaydb: INFO
